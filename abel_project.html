<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABEL PROJECT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #050508;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        canvas {
            display: block;
        }
        
        #scroller {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            z-index: 2;
            pointer-events: auto;
        }
        
        #scroller .scroll-content {
            height: 300vh;
            pointer-events: none;
        }
        
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        
        #instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #c4b5fd;
            font-size: 14px;
            opacity: 0.7;
            z-index: 3;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="scroller">
        <div class="scroll-content"></div>
    </div>
    
    <div id="loader"></div>
    <div id="instructions">Click and hold on "A" to reveal • Scroll to explore</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script type="module">
        // Import Three.js modules via fetch+eval
        async function loadModule(url) {
            const response = await fetch(url);
            const code = await response.text();
            return new Promise((resolve) => {
                const exports = {};
                const module = { exports };
                const fn = new Function('exports', 'module', code);
                fn(exports, module);
                resolve(module.exports);
            });
        }

        // Global variables
        let scene, camera, renderer, clock;
        let renderTarget, aberrationScene, aberrationCamera;
        let leftHand, rightHand, aMesh, belMesh, abelMesh, projectMesh;
        let particleField, glassSpheres = [];
        let lights = {};
        let font = null;
        let isHoldActive = false;
        let aRotationSpeed = 0.003;
        let scrollProgress = 0;
        let currentScrollProgress = 0;
        let phase1Started = false;
        let belVisible = false;
        let permanentAbelVisible = false;
        
        // Materials
        const liquidGlassMaterial = new THREE.MeshPhysicalMaterial({
            transmission: 1.0,
            roughness: 0.05,
            ior: 1.5,
            thickness: 1.4,
            color: new THREE.Color('#c4b5fd'),
            envMapIntensity: 2.2,
            clearcoat: 1.0,
            clearcoatRoughness: 0.04,
            transparent: true,
            opacity: 1.0,
            side: THREE.FrontSide
        });

        const frostedGlassMaterial = new THREE.MeshPhysicalMaterial({
            transmission: 0.88,
            roughness: 0.2,
            ior: 1.5,
            thickness: 0.7,
            color: new THREE.Color('#e0d9ff'),
            envMapIntensity: 2.2,
            clearcoat: 1.0,
            clearcoatRoughness: 0.04,
            transparent: true,
            opacity: 1.0,
            side: THREE.FrontSide
        });

        // Initialize scene
        function init() {
            const container = document.getElementById('canvas-container');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#050508');
            
            // Camera
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 9;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.physicallyCorrectLights = true;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);
            
            // PMREM + RoomEnvironment
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            const roomEnv = new THREE.RoomEnvironment();
            const envTex = pmremGenerator.fromScene(roomEnv).texture;
            scene.environment = envTex;
            
            // Render target for post-processing
            renderTarget = new THREE.WebGLRenderTarget(
                window.innerWidth,
                window.innerHeight,
                {
                    minFilter: THREE.LinearFilter,
                    magFilter: THREE.LinearFilter,
                    format: THREE.RGBAFormat
                }
            );
            
            // Aberration scene
            aberrationScene = new THREE.Scene();
            aberrationCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            const aberrationGeometry = new THREE.PlaneGeometry(2, 2);
            const aberrationMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: null },
                    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform vec2 resolution;
                    varying vec2 vUv;
                    
                    void main() {
                        vec2 uv = vUv;
                        float offset = 0.004;
                        
                        float r = texture2D(tDiffuse, uv + vec2(offset, 0.0)).r;
                        float g = texture2D(tDiffuse, uv).g;
                        float b = texture2D(tDiffuse, uv - vec2(offset, 0.0)).b;
                        
                        gl_FragColor = vec4(r, g, b, 1.0);
                    }
                `
            });
            
            const aberrationMesh = new THREE.Mesh(aberrationGeometry, aberrationMaterial);
            aberrationScene.add(aberrationMesh);
            
            // Clock
            clock = new THREE.Clock();
            
            // Setup lights
            setupLights();
            
            // Setup particle field
            setupParticleField();
            
            // Create loader
            createLoader();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            setupInteraction();
            
            // Load font
            loadFont();
        }

        function setupLights() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.35);
            scene.add(ambientLight);
            
            // Point light 1 (cyan)
            lights.light1 = new THREE.PointLight('#06b6d4', 3.5);
            scene.add(lights.light1);
            
            // Point light 2 (purple)
            lights.light2 = new THREE.PointLight('#7c3aed', 2.5);
            scene.add(lights.light2);
            
            // Spot light
            const spotLight = new THREE.SpotLight('#ffffff', 1.5);
            spotLight.position.set(0, 6, 4);
            spotLight.target.position.set(0, 0, 0);
            scene.add(spotLight);
            scene.add(spotLight.target);
        }

        function setupParticleField() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(400 * 3);
            
            for (let i = 0; i < 400; i++) {
                const r = 6 * Math.cbrt(Math.random());
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: '#c4b5fd',
                size: 0.022,
                transparent: true,
                opacity: 0.35
            });
            
            particleField = new THREE.Points(geometry, material);
            scene.add(particleField);
        }

        function createLoader() {
            const loaderContainer = document.getElementById('loader');
            const loaderCanvas = document.createElement('canvas');
            loaderCanvas.width = 100;
            loaderCanvas.height = 100;
            loaderContainer.appendChild(loaderCanvas);
            
            const loaderScene = new THREE.Scene();
            const loaderCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
            loaderCamera.position.z = 3;
            
            const loaderRenderer = new THREE.WebGLRenderer({ 
                canvas: loaderCanvas, 
                alpha: true,
                antialias: true 
            });
            loaderRenderer.setSize(100, 100);
            
            const geometry = new THREE.IcosahedronGeometry(1, 1);
            const material = new THREE.MeshBasicMaterial({ 
                color: '#06b6d4', 
                wireframe: true 
            });
            const mesh = new THREE.Mesh(geometry, material);
            loaderScene.add(mesh);
            
            function animateLoader() {
                if (!font) {
                    mesh.rotation.x += 0.02;
                    mesh.rotation.y += 0.03;
                    loaderRenderer.render(loaderScene, loaderCamera);
                    requestAnimationFrame(animateLoader);
                } else {
                    gsap.to(loaderContainer, {
                        scale: 0,
                        duration: 0.5,
                        ease: 'power2.inOut',
                        onComplete: () => {
                            loaderContainer.style.display = 'none';
                        }
                    });
                }
            }
            
            animateLoader();
        }

        async function loadFont() {
            try {
                const FontLoader = await loadModule('https://threejs.org/examples/jsm/loaders/FontLoader.js');
                const loader = new FontLoader.FontLoader();
                loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (loadedFont) => {
                    font = loadedFont;
                    createHands();
                    createTextMeshes();
                    startPhase1();
                });
            } catch (error) {
                console.error('Error loading font:', error);
            }
        }

        function createHands() {
            // Left hand
            leftHand = createHand(true);
            leftHand.position.x = -5.5;
            leftHand.rotation.z = 0.2;
            scene.add(leftHand);
            
            // Right hand
            rightHand = createHand(false);
            rightHand.position.x = 5.5;
            rightHand.rotation.z = -0.2;
            scene.add(rightHand);
        }

        function createHand(isLeft) {
            const handGroup = new THREE.Group();
            const scaleX = isLeft ? -1 : 1;
            
            // Palm
            const palmGeo = new THREE.BoxGeometry(0.7, 0.85, 0.18);
            const palm = new THREE.Mesh(palmGeo, liquidGlassMaterial);
            handGroup.add(palm);
            
            // Thumb
            const thumbGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.45, 8);
            const thumb = new THREE.Mesh(thumbGeo, liquidGlassMaterial);
            thumb.rotation.z = Math.PI / 4;
            thumb.position.set(isLeft ? 0.25 : -0.25, -0.25, 0);
            thumb.scale.x = scaleX;
            handGroup.add(thumb);
            
            // Fingers
            const fingerGeo = new THREE.CylinderGeometry(0.065, 0.065, 0.55, 8);
            const fingerPositions = [-0.225, -0.075, 0.075, 0.225];
            
            fingerPositions.forEach((xPos, index) => {
                const finger = new THREE.Mesh(fingerGeo, liquidGlassMaterial);
                finger.position.set(xPos * scaleX, 0.55, 0);
                finger.rotation.z = (index - 1.5) * 0.15 * (isLeft ? -1 : 1);
                handGroup.add(finger);
            });
            
            return handGroup;
        }

        function createTextMeshes() {
            const TextGeometry = window.TextGeometry || THREE.TextGeometry;
            
            // "A" mesh
            const aGeometry = new TextGeometry('A', {
                font: font,
                size: 2.0,
                height: 0.5,
                bevelEnabled: true,
                bevelThickness: 0.08,
                bevelSize: 0.04,
                curveSegments: 16
            });
            aGeometry.center();
            aMesh = new THREE.Mesh(aGeometry, liquidGlassMaterial);
            aMesh.position.y = -5;
            aMesh.scale.set(0, 0, 0);
            aMesh.visible = false;
            scene.add(aMesh);
            
            // "BEL" mesh
            const belGeometry = new TextGeometry('BEL', {
                font: font,
                size: 2.0,
                height: 0.5,
                bevelEnabled: true,
                bevelThickness: 0.08,
                bevelSize: 0.04,
                curveSegments: 16
            });
            belGeometry.center();
            belMesh = new THREE.Mesh(belGeometry, liquidGlassMaterial);
            belMesh.position.set(2.05, 0, 0); // Will be adjusted based on A's bounding box
            belMesh.scale.set(0, 0, 0);
            belMesh.visible = false;
            scene.add(belMesh);
            
            // "ABEL" mesh for scroll phase
            const abelGeometry = new TextGeometry('ABEL', {
                font: font,
                size: 1.2,
                height: 0.3,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.02,
                curveSegments: 16
            });
            abelGeometry.center();
            abelMesh = new THREE.Mesh(abelGeometry, liquidGlassMaterial);
            abelMesh.position.y = 4;
            abelMesh.material.opacity = 0;
            abelMesh.visible = false;
            scene.add(abelMesh);
            
            // "PROJECT" mesh
            const projectGeometry = new TextGeometry('PROJECT', {
                font: font,
                size: 1.2,
                height: 0.3,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.02,
                curveSegments: 16
            });
            projectGeometry.center();
            projectMesh = new THREE.Mesh(projectGeometry, frostedGlassMaterial);
            projectMesh.position.y = -5;
            projectMesh.material.opacity = 0;
            projectMesh.visible = false;
            scene.add(projectMesh);
        }

        function startPhase1() {
            if (phase1Started) return;
            phase1Started = true;
            
            // Show A mesh
            aMesh.visible = true;
            
            // Hands approach
            const tl = gsap.timeline({
                onComplete: () => {
                    // Particle burst
                    createParticleBurst();
                    
                    // Hands separate
                    gsap.to(leftHand.position, {
                        x: -4.2,
                        duration: 1.0,
                        ease: 'power2.out'
                    });
                    
                    gsap.to(rightHand.position, {
                        x: 4.2,
                        duration: 1.0,
                        ease: 'power2.out'
                    });
                    
                    // A rises
                    gsap.to(aMesh.position, {
                        y: 0,
                        duration: 1.0,
                        ease: 'power3.out',
                        onStart: () => {
                            aMesh.visible = true;
                        }
                    });
                    
                    gsap.to(aMesh.scale, {
                        x: 1,
                        y: 1,
                        z: 1,
                        duration: 0.9,
                        ease: 'elastic.out(1, 0.6)'
                    });
                    
                    gsap.to(aMesh.material, {
                        opacity: 1,
                        duration: 0.4
                    });
                }
            });
            
            tl.to(leftHand.position, {
                x: -1.6,
                duration: 2.2,
                ease: 'power2.inOut'
            }, 0);
            
            tl.to(rightHand.position, {
                x: 1.6,
                duration: 2.2,
                ease: 'power2.inOut'
            }, 0);
            
            tl.to(leftHand.rotation, {
                z: 0,
                duration: 2.2,
                ease: 'power2.inOut'
            }, 0);
            
            tl.to(rightHand.rotation, {
                z: 0,
                duration: 2.2,
                ease: 'power2.inOut'
            }, 0);
            
            tl.to({}, { duration: 0.3 }); // Pause at peak closeness
        }

        function createParticleBurst() {
            for (let i = 0; i < 60; i++) {
                const radius = 0.02 + Math.random() * 0.04;
                const geometry = new THREE.SphereGeometry(radius, 8, 8);
                const material = new THREE.MeshPhysicalMaterial({
                    transmission: 1.0,
                    roughness: 0.05,
                    ior: 1.5,
                    thickness: 1.4,
                    color: new THREE.Color('#c4b5fd'),
                    transparent: true,
                    opacity: 1.0
                });
                
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(0, 0, 0);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).normalize().multiplyScalar(0.05 + Math.random() * 0.1);
                
                scene.add(sphere);
                glassSpheres.push({
                    mesh: sphere,
                    velocity: velocity,
                    age: 0,
                    maxAge: 1.2
                });
            }
        }

        function setupInteraction() {
            const scroller = document.getElementById('scroller');
            const canvas = renderer.domElement;
            
            // Mouse interaction
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('mouseleave', onMouseUp);
            
            // Touch interaction
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd);
            canvas.addEventListener('touchcancel', onTouchEnd);
            
            // Scroll interaction
            scroller.addEventListener('scroll', onScroll);
        }

        function getMouseNDC(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX || (event.touches && event.touches[0].clientX)) - rect.left) / rect.width;
            const y = ((event.clientY || (event.touches && event.touches[0].clientY)) - rect.top) / rect.height;
            return new THREE.Vector2(x * 2 - 1, -(y * 2 - 1));
        }

        function checkIntersection(ndc) {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(ndc, camera);
            
            const intersects = raycaster.intersectObject(aMesh);
            return intersects.length > 0;
        }

        function onMouseDown(event) {
            if (event.button !== 0) return; // Only left click
            
            const ndc = getMouseNDC(event);
            if (checkIntersection(ndc)) {
                startHold();
            }
        }

        function onMouseUp() {
            endHold();
        }

        function onTouchStart(event) {
            event.preventDefault();
            const ndc = getMouseNDC(event);
            if (checkIntersection(ndc)) {
                startHold();
            }
        }

        function onTouchEnd() {
            endHold();
        }

        function startHold() {
            if (isHoldActive) return;
            isHoldActive = true;
            aRotationSpeed = 0.012;
            
            // Show BEL
            if (!belVisible) {
                belVisible = true;
                belMesh.visible = true;
                
                // Calculate proper positioning
                const aBox = new THREE.Box3().setFromObject(aMesh);
                const belBox = new THREE.Box3().setFromObject(belMesh);
                const aWidth = aBox.max.x - aBox.min.x;
                const belWidth = belBox.max.x - belBox.min.x;
                belMesh.position.x = aWidth / 2 + belWidth / 2 + 0.05;
                
                gsap.to(belMesh.scale, {
                    x: 1,
                    y: 1,
                    z: 1,
                    duration: 0.5,
                    ease: 'elastic.out(1, 0.6)'
                });
                
                gsap.to(belMesh.material, {
                    opacity: 1,
                    duration: 0.3
                });
                
                // Hide instructions after first interaction
                gsap.to('#instructions', {
                    opacity: 0,
                    duration: 0.5,
                    delay: 2
                });
            }
            
            gsap.to(aMesh.scale, {
                x: 1.1,
                y: 1.1,
                z: 1.1,
                duration: 0.3,
                ease: 'elastic.out(1, 0.6)'
            });
        }

        function endHold() {
            if (!isHoldActive) return;
            isHoldActive = false;
            aRotationSpeed = 0.003;
            
            if (belVisible && !permanentAbelVisible) {
                gsap.to(belMesh.scale, {
                    x: 0,
                    y: 0,
                    z: 0,
                    duration: 0.3,
                    ease: 'power2.in',
                    onComplete: () => {
                        belMesh.visible = false;
                        belVisible = false;
                    }
                });
                
                gsap.to(belMesh.material, {
                    opacity: 0,
                    duration: 0.3
                });
            }
            
            gsap.to(aMesh.scale, {
                x: 1,
                y: 1,
                z: 1,
                duration: 0.3,
                ease: 'elastic.out(1, 0.6)'
            });
        }

        function onScroll() {
            const scroller = document.getElementById('scroller');
            const maxScroll = scroller.scrollHeight - scroller.clientHeight;
            scrollProgress = scroller.scrollTop / maxScroll;
        }

        function readScroll(delta) {
            // Smooth scroll progress
            currentScrollProgress += (scrollProgress - currentScrollProgress) * 0.1;
            
            const progress = currentScrollProgress;
            
            if (progress > 0.01) {
                permanentAbelVisible = true;
            }
            
            // Phase 1: 0 → 0.3
            if (progress <= 0.3) {
                const phase1Progress = progress / 0.3;
                
                // Hands drift out and fade
                leftHand.position.x = THREE.MathUtils.lerp(-4.2, -7, phase1Progress);
                rightHand.position.x = THREE.MathUtils.lerp(4.2, 7, phase1Progress);
                leftHand.material = leftHand.material.clone();
                leftHand.children.forEach(child => {
                    child.material.opacity = THREE.MathUtils.lerp(1, 0, phase1Progress);
                });
                rightHand.children.forEach(child => {
                    child.material.opacity = THREE.MathUtils.lerp(1, 0, phase1Progress);
                });
                
                // A moves up and scales down
                aMesh.position.y = THREE.MathUtils.lerp(0, 1.8, phase1Progress);
                aMesh.scale.setScalar(THREE.MathUtils.lerp(1, 0.7, phase1Progress));
                
                // Camera zooms out
                camera.position.z = THREE.MathUtils.lerp(9, 11, phase1Progress);
            }
            
            // Phase 2: 0.3 → 0.6
            if (progress >= 0.3 && progress <= 0.6) {
                const phase2Progress = (progress - 0.3) / 0.3;
                
                // Show ABEL mesh
                if (!abelMesh.visible && phase2Progress > 0.1) {
                    abelMesh.visible = true;
                }
                
                abelMesh.position.y = THREE.MathUtils.lerp(4, 2.5, Math.min(phase2Progress / 0.3, 1));
                abelMesh.material.opacity = THREE.MathUtils.lerp(0, 1, Math.min(phase2Progress / 0.3, 1));
                
                // Hide original A and hands
                if (phase2Progress > 0.5) {
                    aMesh.material.opacity = THREE.MathUtils.lerp(1, 0, (phase2Progress - 0.5) / 0.5);
                }
            }
            
            // Phase 3: 0.4 → 0.65 (PROJECT appears)
            if (progress >= 0.4 && progress <= 0.65) {
                const phase3Progress = (progress - 0.4) / 0.25;
                
                if (!projectMesh.visible && phase3Progress > 0.1) {
                    projectMesh.visible = true;
                }
                
                projectMesh.position.y = THREE.MathUtils.lerp(-5, 1.0, Math.min(phase3Progress, 1));
                projectMesh.material.opacity = THREE.MathUtils.lerp(0, 1, Math.min(phase3Progress, 1));
            }
            
            // Phase 4: 0.65 → 1.0 (Final state)
            if (progress > 0.65) {
                const phase4Progress = (progress - 0.65) / 0.35;
                
                // Gentle bobbing
                const bobOffset = Math.sin(clock.getElapsedTime() * 0.7) * 0.001;
                abelMesh.position.y = 2.5 + bobOffset;
                projectMesh.position.y = 1.0 + bobOffset;
                
                // Ensure full visibility
                abelMesh.material.opacity = 1;
                projectMesh.material.opacity = 1;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            renderTarget.setSize(window.innerWidth, window.innerHeight);
            
            aberrationScene.children[0].material.uniforms.resolution.value.set(
                window.innerWidth,
                window.innerHeight
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            // Update A rotation
            if (aMesh) {
                aMesh.rotation.y += aRotationSpeed;
                
                // Idle bobbing (only when not in scroll phase)
                if (currentScrollProgress < 0.1 && !isHoldActive) {
                    aMesh.position.y += Math.sin(time * 0.7) * 0.001;
                }
            }
            
            // Update lights
            if (lights.light1) {
                lights.light1.position.set(
                    Math.sin(time) * 5,
                    Math.cos(time * 0.6) * 2.5,
                    3.5
                );
            }
            
            if (lights.light2) {
                lights.light2.position.set(
                    Math.cos(time * 1.2) * 4,
                    Math.sin(time * 0.9) * 2,
                    2
                );
            }
            
            // Update particle field
            if (particleField) {
                const positions = particleField.geometry.attributes.position.array;
                for (let i = 0; i < 400; i++) {
                    positions[i * 3 + 1] += 0.0003;
                    if (positions[i * 3 + 1] > 6) {
                        positions[i * 3 + 1] = -6;
                    }
                }
                particleField.geometry.attributes.position.needsUpdate = true;
            }
            
            // Update glass spheres
            for (let i = glassSpheres.length - 1; i >= 0; i--) {
                const sphere = glassSpheres[i];
                sphere.age += delta;
                
                sphere.mesh.position.add(sphere.velocity);
                sphere.mesh.material.opacity = 1 - (sphere.age / sphere.maxAge);
                
                if (sphere.age >= sphere.maxAge) {
                    scene.remove(sphere.mesh);
                    glassSpheres.splice(i, 1);
                }
            }
            
            // Hand floating animation
            if (leftHand && currentScrollProgress < 0.3) {
                leftHand.position.y = Math.sin(time * 0.5) * 0.05;
                rightHand.position.y = Math.sin(time * 0.5 + Math.PI) * 0.05;
            }
            
            // Read scroll
            readScroll(delta);
            
            // Render scene to render target
            renderer.setRenderTarget(renderTarget);
            renderer.render(scene, camera);
            
            // Render aberration to screen
            renderer.setRenderTarget(null);
            aberrationScene.children[0].material.uniforms.tDiffuse.value = renderTarget.texture;
            renderer.render(aberrationScene, aberrationCamera);
        }

        // Load TextGeometry module
        async function loadTextGeometry() {
            const TextGeometry = await loadModule('https://threejs.org/examples/jsm/geometries/TextGeometry.js');
            window.TextGeometry = TextGeometry.TextGeometry;
        }

        // Initialize everything
        async function main() {
            await loadTextGeometry();
            init();
            animate();
        }

        main();
    </script>
</body>
</html>
